<svg fill="none" viewBox="0 0 800 400" width="800" height="400" xmlns="http://www.w3.org/2000/svg">
	<foreignObject width="100%" height="100%">
		<div class="bg" xmlns="http://www.w3.org/1999/xhtml">
			<style>
				@keyframes rotate {
					0% {
						transform: rotate(2deg);
					}
					100% {
						transform: rotate(-2deg);
					}
				}
				@keyframes color {
					0% {
						background-position: 0% 50%;
					}
					30% {
						background-position: 100% 50%;
					}
					60% {
						background-position: 25% 75%;
					}
					100% {
						background-position: 0% 50%;
					}
				}
				.container {
					display: flex;
					flex-direction: column;
					justify-content = center;
					text-align = center;
					border-radius: 8px;
				}
                .bg {
					background: linear-gradient(-45deg, #E1FFB1, #C7F2A4, #B6E388);
                    animation: color 10s ease infinite;
                }
				h1 {
					font-size: 50px;
					line-height: 1.3;
					animation: rotate ease-in-out 3s infinite alternate;
                    color: white;
				}
			</style>
			<div class="container"><h1>42 Student</h1><p>jewancti</p></div>
		</div>
	</foreignObject>
</svg>