<svg fill="none" viewBox="0 0 800 400" width="800" height="300" xmlns="http://www.w3.org/2000/svg">
	<foreignObject width="100%" height="100%">
		<div xmlns="http://www.w3.org/1999/xhtml">
			<style>
				@keyframes rotate {
					0% {
						transform: rotate(2deg);
					}
					100% {
						transform: rotate(-2deg);
					}
				}
				@keyframes color {
					0% {
						background-position: 0% 50%;
					}
					50% {
						background-position: 100% 50%;
					}
					100% {
						background-position: 0% 50%;
					}
				}
				.first {
					display: flex;
					flex-direction: column;
				}
				.container {
					width: 400px;
					height: 120px;
					margin: 0 auto;
					text-align: center;
					border-radius: 8px;
				}
				.bg {
					background: linear-gradient(-45deg, #E1FFB1, #C7F2A4, #B6E388);
					background-size: 400% 600%;
					animation: color 10s ease infinite;
				}
				h1 {
					font-family: Verdana, Geneva, Tahoma, sans-serif;
					font-size: 40px;
					line-height: 1.9;
					animation: rotate ease-in-out 10s infinite alternate;
					color: #fbfdfa;
				}
				h1 i {
					color: #FCFFB2;
				}
				p {
					color: #FCFFB2;
					font-size: 35px;
					margin-top: -30px;
					font-family: Cambria, Cochin, Georgia, Times, 'Times New Roman', serif;
				}
				p::before {
					content: 'jewancti';
					background-image: url(./image.gif);
					background-clip: text;
					background-size: cover;
					-webkit-background-clip: text;
					color: transparent;
					width: 200px;
				}
			</style>
			<div class="first">
				<div class="container bg"><h1>42's <i>Student</i></h1><p></p></div>
				<div>
					<a href="https://github.com/JaeSeoKim/badge42"><img src="https://badge42.vercel.app/api/v2/clad9gqo000250fjpk6o1z16e/stats?cursusId=21&coalitionId=48" alt="jewancti's 42 stats" /></a>
					<a href="https://github.com/JaeSeoKim/badge42"><img src="https://badge42.vercel.app/api/v2/clad9gqo000250fjpk6o1z16e/project/2868601" alt="jewancti's 42 Libft Score" /></a>
					<a href="https://github.com/JaeSeoKim/badge42"><img src="https://badge42.vercel.app/api/v2/clad9gqo000250fjpk6o1z16e/project/2871549" alt="jewancti's 42 get_next_line Score" /></a>
					<a href="https://github.com/JaeSeoKim/badge42"><img src="https://badge42.vercel.app/api/v2/clad9gqo000250fjpk6o1z16e/project/2875558" alt="jewancti's 42 Born2beroot Score" /></a>
				</div>
			</div>
		</div>
	</foreignObject>
</svg>